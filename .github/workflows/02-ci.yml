# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

on:
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v

      - name: Run Trivy vulnerability scan on Docker image
        # Scan the Docker image for vulnerabilities.
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}
          format: 'sarif'
          output: 'trivy-image-results.sarif'

      - name: Run Trivy vulnerability scan on filesystem
        # Scan the filesystem for vulnerabilities.
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        # Upload scan results for visibility in the security tab.
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: |
            trivy-image-results.sarif
            trivy-fs-results.sarif
